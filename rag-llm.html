<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Website</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }

    header {
      background: #333;
      color: white;
      padding: 20px;
      text-align: center;
    }

    nav {
      background: #555;
      padding: 10px;
      text-align: center;
    }

    nav a {
      color: white;
      margin: 0 15px;
      text-decoration: none;
      font-weight: bold;
    }

    nav a:hover {
      text-decoration: underline;
    }

    .hero {
      padding: 80px 20px;
      text-align: center;
      background: #f4f4f4;
    }

    .hero h1 {
      font-size: 2.5rem;
    }

    .hero p {
      font-size: 1.2rem;
      color: #555;
    }

    .cta {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 25px;
      background: #007BFF;
      color: white;
      border-radius: 5px;
      text-decoration: none;
    }

    .section {
      padding: 40px 20px;
      text-align: center;
    }

    footer {
      background: #333;
      color: white;
      text-align: center;
      padding: 15px;
    }
  </style>
</head>

<body>

  <!-- Header -->
  <header>
    <h1>My Website</h1>
    <p>Welcome to my simple website</p>
  </header>

  <!-- Navigation -->
  <nav>
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Services</a>
    <a href="#">Contact</a>
  </nav>

  <!-- Hero Section -->
  <div class="hero">
    <h1>Build Something Amazing 🚀</h1>
    <p>This is a simple HTML page to get you started</p>
    <a href="#" class="cta">Get Started</a>
  </div>

  <!-- Section -->
  <div class="section">
    <h2>About Us</h2>
    <p>We create simple and clean web experiences.</p>
  </div>

  <!-- Footer -->
  <footer>
    <p>© 2026 My Website</p>
  </footer>

</body>
</html>
